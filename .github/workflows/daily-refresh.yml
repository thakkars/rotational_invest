name: Rotation Dashboard

on:

  workflow_dispatch:

  schedule:
    - cron: '30 10 * * 1-5'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install pandas yfinance openpyxl requests

    - name: Update Status START
      run: |
        echo '{"progress":20,"message":"Fetching market data"}' > status.json

    - name: Run Dashboard Script
      run: |
        python rotation_invest.py

    - name: Update Status DASHBOARD
      run: |
        echo '{"progress":70,"message":"Generating dashboard"}' > status.json

    - name: Update Status COMPLETE
      run: |
        echo '{"progress":100,"message":"Completed Successfully"}' > status.json

    - name: Commit Files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add .

        git commit -m "dashboard update" || echo "No changes"

        git push

    - name: Deploy to Cloudflare Workers
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy
