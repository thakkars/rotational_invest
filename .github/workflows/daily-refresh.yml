name: Daily Rotation Refresh

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 4:00 PM IST (UTC+5:30) = 10:30 UTC, Mon-Fri only
  workflow_dispatch:            # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/StreamAlpha/tvdatafeed.git
          pip install pandas>=2.0.0 openpyxl>=3.1.0 boto3>=1.34.0 requests>=2.31.0

      - name: Run rotation script
        env:
          FILE_PATH: output/rotation_invest.xlsx
          HTML_PATH: output/index.html
        run: python rotation_invest.py

      - name: Upload Excel to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          aws s3 cp output/rotation_invest.xlsx s3://${{ secrets.R2_BUCKET }}/rotation_invest.xlsx \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --no-progress

      - name: Upload HTML dashboard to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          aws s3 cp output/index.html s3://${{ secrets.R2_BUCKET }}/index.html \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --content-type "text/html" \
            --no-progress

      - name: Commit and push updated files to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add output/rotation_invest.xlsx output/index.html
          git diff --staged --quiet || git commit -m "[auto] Daily refresh $(date +'%d-%m-%Y %H:%M IST')"
          git push
